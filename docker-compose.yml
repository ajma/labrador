services:
  labrador:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - labrador-data:/data
    environment:
      DATABASE_PATH: /data/labrador.db
      JWT_SECRET: ${JWT_SECRET}
    restart: unless-stopped

volumes:
  labrador-data:
