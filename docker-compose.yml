services:
  homelabman:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - homelabman-data:/data
    environment:
      DATABASE_PATH: /data/homelabman.db
      JWT_SECRET: ${JWT_SECRET}
    restart: unless-stopped

volumes:
  homelabman-data:
