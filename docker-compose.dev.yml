services:
  labrador:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
      - "5173:5173"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app
      - node_modules:/app/node_modules
    environment:
      DATABASE_PATH: ./data/labrador.db
      JWT_SECRET: dev-secret
      NODE_ENV: development
    command: pnpm dev

volumes:
  node_modules:
