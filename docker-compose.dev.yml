services:
  homelabman:
    build: .
    ports:
      - "3000:3000"
      - "5173:5173"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app
      - /app/node_modules
    environment:
      DATABASE_PATH: ./data/homelabman.db
      JWT_SECRET: dev-secret
      NODE_ENV: development
    command: pnpm dev
